name: Bug report
description: File an issue that documents a bug.
title: '[Bug]: '
labels:
  - bug
body:
  - type: textarea
    id: bug_description
    attributes:
      label: Description
      description: Describe the bug you have encountered
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: >-
        Please attach relevant logs here. Usually `nextflow.log` is a good one
        to use.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected_outcome
    attributes:
      label: Expected Outcome
      description: Do you have an expected outcome? Please describe it.
  - type: markdown
    attributes:
      value: >-
        This template was generated with [Issue Forms
        Creator](https://issue-forms-creator.netlify.app)
