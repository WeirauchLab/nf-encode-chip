sample_names_ignore:
  - "*_pr1"
  - "*_pr2"
table_sample_merge:
  "R1": "_read1"
  "R2": "_read2"
  "PR1": "_pr1"
  "PR2": "_pr2"

extra_fn_clean_exts:
  - "_matches"
  - ".lowq_filt"
  - "_fingerprint"
  - "_fingerprint.tab"
  - ".nodup"

report_section_order:
  fastp:
    order: 1000
  bowtie2:
    order: 990
  picard:
    order: 980
  samtools:
    order: 972
  encode_lib_qc:
    order: 971
  spp_xcorr:
    order: 970
  deepTools:
    order: 960
  encode_reproducibility:
    order: 950
  homer_findmotifsgenome:
    order: 890
  kraken:
    order: 790
  sourmash:
    order: 780
  fastqc_raw:
    order: 90
  fastqc_trimmed:
    order: 80
  multiqc_software_versions:
    order: 1

module_order:
  - fastqc:
      name: "FastQC (raw)"
      info: "This section of the report shows FastQC results before adapter trimming."
      anchor: "fastqc_raw"
      path_filters:
        - "data/fastqc/raw/*.zip"
  - fastqc:
      name: "FastQC (trimmed)"
      info: "This section of the report shows FastQC results after adapter trimming."
      anchor: "fastqc_trimmed"
      path_filters:
        - "data/fastqc/trimmed/*.zip"

sp:
  sourmash/gather:
    fn: "*_matches.csv"

table_columns_visible:
  mtnucratio: false
  ENCODE Library Complexity:
    positions_with_one_read: false
    positions_with_two_reads: false
    total_fragments: false
    distinct_fragments: false

